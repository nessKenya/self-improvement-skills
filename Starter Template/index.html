<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="bootstrap-5.0.2-dist/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="bootstrap-5.0.2-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="signin-body">

    <div class="container signin-container">
      <div class="row">

        <div class="col">

        </div>

        <div class="col-sm-12 col-md-8">
          <div class="card signin-card">
            <div class="card-body">
              <div class="img-fluid">
                <img src="assets/devslope.png" alt="" class="signin-img">
                <h1><span class="dev">DEV</span><span class="slopes">SLOPES</span></h1>
              </div>
              <form class="signin-form">
                <div class="mb-3">
                  <input type="email" class="form-control" id="emailInput" placeholder="Email">
                </div>
                <div class="mb-3">
                  <input type="password" class="form-control" id="passwordInput" placeholder="Password">
                </div>
                <button type="button" class="btn signin-btn btn-lg">Sign In</button>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                  <label class="form-check-label" for="flexCheckDefault">
                    Remember Me <a href="#"> Need Help?</a>
                  </label>
                </div>
              </form>
            </div>
          </div>
          <a href="#" class="create-new-account">Create New Account</a>
        </div>

        <div class="col">

        </div>
      </div>
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="bootstrap-5.0.2-dist/js/bootstrap.min.js"></script>

</body>
</html>
